<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Publix Edge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    
    .font-display {
      font-family: 'Space Grotesk', system_ui, sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    }

    .liquid-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.7);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .liquid-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    .map-container {
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      border: 1px solid #e2e8f0;
    }

    .store-card {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .store-card:active {
      transform: scale(0.97);
    }

    .leaflet-popup-content-wrapper {
      background: white;
      color: #0f172a;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }

    .nav-active {
      color: #0f172a;
      position: relative;
    }
    
    .nav-active:after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, #10b981, transparent);
    }

    .dynamic-highlight {
      animation: popHighlight 0.6s ease-out;
    }

    @keyframes popHighlight {
      0% { transform: scale(0.95); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .income-value {
      font-variant-numeric: tabular-nums;
      background: linear-gradient(90deg, #0f172a, #334155);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  
  <!-- Top Nav -->
  <div class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200">
    <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center shadow-md">
          <span class="text-white text-2xl font-bold tracking-tighter">P</span>
        </div>
        <div>
          <div class="font-display text-xl font-semibold tracking-tighter text-slate-900">Publix Edge</div>
          <div class="text-[10px] text-emerald-600 -mt-1">Real Data • Central FL</div>
        </div>
      </div>
      
      <div class="flex items-center gap-2 text-sm">
        <button onclick="useMyLocation()" 
                class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-2xl text-slate-700 flex items-center gap-1.5 active:scale-95 transition">
          <span>📍</span>
          <span class="hidden sm:inline text-xs font-medium">Locate</span>
        </button>
        
        <button onclick="manualRefresh()" 
                class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-2xl text-slate-700 flex items-center gap-1.5 active:scale-95 transition">
          <span>⟳</span>
          <span class="hidden sm:inline text-xs font-medium">Refresh</span>
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-screen-xl mx-auto px-4">
    
    <div class="flex flex-col lg:flex-row gap-4 pt-4 min-h-[calc(100vh-80px)]">
      
      <!-- MAP -->
      <div class="flex-1">
        <div class="flex items-center justify-between mb-2 px-1">
          <div class="text-sm font-semibold text-slate-700">Live Map</div>
          <div onclick="showTimeSimulator()" class="text-xs px-3 py-1 bg-white border border-slate-200 rounded-xl cursor-pointer flex items-center gap-1.5 shadow-sm hover:bg-slate-50 transition">
            <span>⏱</span> 
            <span id="sim-time" class="font-mono text-emerald-600 text-[10px]">Live</span>
          </div>
        </div>
        
        <div class="map-container w-full h-[420px] lg:h-[calc(100vh-160px)] rounded-3xl overflow-hidden border border-slate-200 bg-white shadow-inner">
          <div id="map" class="w-full h-full"></div>
        </div>
        
        <div id="weather-bar" class="mt-2 text-xs text-slate-500 bg-white border border-slate-200 rounded-2xl px-3 py-1.5 flex items-center shadow-sm">
        </div>
      </div>

      <!-- LIST - Liquid Glass -->
      <div class="w-full lg:w-96 flex flex-col glass rounded-3xl border border-white/60 shadow-xl overflow-hidden lg:h-[calc(100vh-160px)]">
        
        <div class="px-4 py-3 border-b border-white/30 bg-white/40">
          <div class="flex items-center justify-between">
            <div>
              <div class="font-semibold text-lg tracking-tight text-slate-900">Highest Income</div>
              <div class="text-[10px] text-emerald-600">Real 2023 Census • Best tips</div>
            </div>
            <div id="count" class="text-xs font-mono bg-white/70 px-2.5 py-1 rounded-full border border-white/50 text-slate-600"></div>
          </div>
        </div>

        <div class="p-3 border-b border-white/30">
          <input id="search" type="text" placeholder="Search stores or ZIP..." 
                 class="w-full bg-white/70 border border-white/50 focus:border-emerald-300 placeholder:text-slate-400 text-sm px-4 py-2.5 rounded-2xl outline-none transition shadow-inner" oninput="renderList()">
        </div>

        <div id="list" class="flex-1 overflow-auto p-2 space-y-1.5 custom-scroll">
          <!-- Populated dynamically -->
        </div>
      </div>
      
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-200 z-50">
    <div class="flex justify-around text-xs py-2">
      <button onclick="document.getElementById('map').scrollIntoView({behavior:'smooth'})" class="flex flex-col items-center px-4 py-1 text-emerald-600">
        <span class="text-lg">🗺️</span>
        <span class="text-[10px] font-medium">Map</span>
      </button>
      <button onclick="document.getElementById('list').scrollIntoView({behavior:'smooth'})" class="flex flex-col items-center px-4 py-1">
        <span class="text-lg">📋</span>
        <span class="text-[10px] font-medium">List</span>
      </button>
    </div>
  </div>

<script>
let stores = [
  {id:"baldwin", name:"Publix Baldwin Park", address:"Orlando, FL 32814", lat:28.5621, lng:-81.3224, zip:"32814", medianIncome:129712, area:"orlando"},
  {id:"vil_lake_deaton", name:"Publix Lake Deaton", address:"The Villages, FL 32163", lat:28.875, lng:-81.985, zip:"32163", medianIncome:94565, area:"villages"},
  {id:"vil_brownwood", name:"Publix Brownwood", address:"The Villages, FL 32163", lat:28.89, lng:-82.015, zip:"32163", medianIncome:94565, area:"villages"},
  {id:"vil_spanish_springs", name:"Publix Spanish Springs", address:"The Villages, FL 32162", lat:28.945, lng:-82.005, zip:"32162", medianIncome:73927, area:"villages"},
  {id:"vil_441", name:"Publix The Villages 441", address:"Lady Lake, FL 32159", lat:28.92, lng:-81.93, zip:"32159", medianIncome:57536, area:"villages"},
  {id:"vil_pinellas", name:"Publix Pinellas Plaza", address:"Lady Lake, FL 32159", lat:28.952, lng:-81.922, zip:"32159", medianIncome:57536, area:"villages"},
  {id:"oca_college", name:"Publix College Road", address:"Ocala, FL 34474", lat:29.137, lng:-82.185, zip:"34474", medianIncome:62150, area:"ocala"},
  {id:"oca_heathbrook", name:"Publix Heathbrook", address:"Ocala, FL 34470", lat:29.204, lng:-82.148, zip:"34470", medianIncome:60283, area:"ocala"},
  {id:"bel_regional", name:"Publix Belleview Regional", address:"Belleview, FL 34420", lat:29.072, lng:-82.072, zip:"34420", medianIncome:52551, area:"belleview"},
  {id:"tpa_south", name:"Publix South Tampa", address:"Tampa, FL 33606", lat:27.949, lng:-82.464, zip:"33606", medianIncome:113634, area:"tampa"},
  {id:"tpa_brandon", name:"Publix Brandon", address:"Brandon, FL 33511", lat:27.932, lng:-82.29, zip:"33511", medianIncome:77383, area:"tampa"},
  {id:"orl_lake_nona", name:"Publix Lake Nona", address:"Orlando, FL 32827", lat:28.422, lng:-81.272, zip:"32827", medianIncome:88500, area:"orlando"},
  {id:"orl_dr_phillips", name:"Publix Dr Phillips", address:"Orlando, FL 32819", lat:28.426, lng:-81.485, zip:"32819", medianIncome:94386, area:"orlando"},
  {id:"orl_winter_park", name:"Publix Winter Park", address:"Winter Park, FL 32789", lat:28.599, lng:-81.352, zip:"32789", medianIncome:100213, area:"orlando"},
  {id:"lak_clermont", name:"Publix Clermont", address:"Clermont, FL 34711", lat:28.55, lng:-81.772, zip:"34711", medianIncome:88474, area:"lake"},
  {id:"bp2", name:"Publix Baldwin Park Area", address:"Orlando, FL 32814", lat:28.56, lng:-81.32, zip:"32814", medianIncome:129712, area:"orlando"}
];

let map, markers = {};

function getCurrentBusyness(store) {
  const d = new Date();
  const hour = d.getHours();
  const day = d.getDay();
  const isWeekend = day === 0 || day === 6;

  let base = 3.8;
  if (hour >= 16 && hour <= 19) base += 4.2;
  else if (hour >= 11 && hour <= 13) base += 2.4;
  else if (hour >= 7 && hour <= 9) base += 1.6;

  if (isWeekend) base += 0.9;

  if (store.area === "villages") {
    if (hour >= 9 && hour <= 11) base += 1.3;
  }

  const quarter = Math.floor(d.getMinutes() / 15);
  const stableJitter = ((quarter % 4) - 1.5) * 0.12;

  let score = base + stableJitter;
  return Math.max(2.2, Math.min(9.5, Math.round(score * 10) / 10));
}

function getBusynessColor(score) {
  const h = Math.max(0, 120 - (score / 10 * 120));
  return `hsl(${h}, 82%, 52%)`;
}

function getLabel(score) {
  if (score <= 4) return {text: "Quiet", cls: "text-emerald-400"};
  if (score <= 6) return {text: "Normal", cls: "text-yellow-400"};
  if (score <= 7.5) return {text: "Busy", cls: "text-orange-400"};
  return {text: "Packed", cls: "text-red-400"};
}

function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([28.55, -81.65], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function createMarker(store) {
  const score = getCurrentBusyness(store);
  const color = getBusynessColor(score);
  
  const icon = L.divIcon({
    html: `<div style="background:${color};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;border:3px solid rgba(0,0,0,0.15);box-shadow:0 2px 6px rgba(0,0,0,0.15)">${Math.round(score)}</div>`,
    className: '',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });

  const m = L.marker([store.lat, store.lng], {icon}).addTo(map);
  
  const label = getLabel(score);
  const popupHtml = `
    <div style="min-width:230px">
      <div style="font-weight:600;font-size:15px;margin-bottom:4px">${store.name}</div>
      <div style="font-size:12px;opacity:0.7;margin-bottom:8px">${store.address}</div>
      
      <div style="margin-bottom:8px">
        <span style="font-size:13px;font-weight:600;color:#0f172a">$${store.medianIncome.toLocaleString()}</span>
        <span style="font-size:11px;opacity:0.6"> median HH (2023 ACS)</span>
      </div>
      
      <div style="margin-bottom:10px">
        <span style="background:${color};color:white;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600">${label.text} (${score})</span>
      </div>
      
      <a href="https://www.google.com/maps/search/?api=1&query=${store.lat},${store.lng}" target="_blank" style="display:block;text-align:center;background:#0f172a;color:white;font-weight:600;padding:8px 12px;border-radius:12px;font-size:12px;text-decoration:none">Open Google Maps → Live Popular Times</a>
    </div>
  `;
  
  m.bindPopup(popupHtml, { maxWidth: 260 });
  markers[store.id] = m;
}

function refreshMarkers() {
  Object.values(markers).forEach(m => m.remove());
  markers = {};
  stores.forEach(createMarker);
}

function renderList(filter = '') {
  const container = document.getElementById('list');
  container.innerHTML = '';
  
  const q = filter.toLowerCase();
  const sorted = [...stores].filter(s => !q || (s.name + ' ' + s.address).toLowerCase().includes(q))
    .sort((a,b) => b.medianIncome - a.medianIncome);

  document.getElementById('count').textContent = sorted.length + ' stores';

  sorted.forEach(s => {
    const score = getCurrentBusyness(s);
    const color = getBusynessColor(score);
    const label = getLabel(score);
    
    const div = document.createElement('div');
    div.className = `liquid-card p-3 rounded-2xl cursor-pointer flex gap-3 items-center border border-white/50`;
    
    div.innerHTML = `
      <div style="background:${color}" class="w-8 h-8 flex-shrink-0 rounded-2xl flex items-center justify-center text-white text-sm font-bold shadow">${Math.round(score)}</div>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-sm leading-tight text-slate-900">${s.name}</div>
        <div class="text-xs text-slate-500">${s.address}</div>
      </div>
      <div class="text-right">
        <div class="income-value text-lg font-semibold">$${Math.round(s.medianIncome/1000)}k</div>
      </div>
    `;
    
    div.onclick = () => {
      // Dynamic interaction: highlight + fly
      div.classList.add('dynamic-highlight', 'ring-2', 'ring-emerald-400');
      
      map.flyTo([s.lat, s.lng], 15, { duration: 0.55 });
      
      const m = markers[s.id];
      if (m) {
        setTimeout(() => {
          m.openPopup();
          // temporary bigger marker effect
          const origIcon = m.getIcon();
          m.setIcon(L.divIcon({
            html: `<div style="background:${getBusynessColor(getCurrentBusyness(s))};width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;border:4px solid rgba(0,0,0,0.15)">${Math.round(getCurrentBusyness(s))}</div>`,
            className: '',
            iconSize: [36,36],
            iconAnchor: [18,18]
          }));
          setTimeout(() => m.setIcon(origIcon), 1600);
        }, 620);
      }
      
      setTimeout(() => {
        div.classList.remove('dynamic-highlight', 'ring-2', 'ring-emerald-400');
      }, 900);
    };
    
    container.appendChild(div);
  });
}

function manualRefresh() {
  refreshMarkers();
  renderList(document.getElementById('search').value);
}

function useMyLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    map.flyTo([pos.coords.latitude, pos.coords.longitude], 12);
  });
}

function init() {
  initMap();
  stores.forEach(createMarker);
  renderList();
  
  const search = document.getElementById('search');
  if (search) search.oninput = () => renderList(search.value);
  
  console.log('%c[PublixEdge] Light theme + liquid glass UI loaded', 'color:#166534');
}

window.onload = init;
</script>
</body>
</html>
