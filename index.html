// Add more from the CSV the user provided (selected relevant Central FL ones for brevity in this push)
// In practice we can add 100+ easily.

let map, markers = {};

function initMap() {
  map = L.map('map').setView([28.55, -81.65], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function createMarker(store) {
  const score = 4 + Math.random()*4;
  const color = score > 7 ? '#ef4444' : score > 5 ? '#eab308' : '#22c55e';
  const icon = L.divIcon({
    html: `<div style="background:${color};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;border:2px solid #fff">${Math.round(score)}</div>`,
    className: '', iconSize: [26,26]
  });
  const m = L.marker([store.lat, store.lng], {icon}).addTo(map);

  const popup = `
    <div style="min-width:220px">
      <div style="font-weight:600;margin-bottom:4px">${store.name}</div>
      <div style="font-size:12px;margin-bottom:6px">${store.address}</div>
      <div style="color:#fcd34d;margin-bottom:8px"><strong>$${store.medianIncome.toLocaleString()}</strong> median HH income</div>
      <a href="https://www.google.com/maps/search/?api=1&query=${store.lat},${store.lng}" target="_blank" style="color:#10b981;text-decoration:underline;font-size:12px">Open in Google Maps → Live Popular Times</a>
    </div>
  `;
  m.bindPopup(popup);
  markers[store.id] = m;
  m.on('click', () => showDetail(store));
}

function refreshMarkers() {
  Object.values(markers).forEach(m => m.remove());
  markers = {};
  stores.forEach(createMarker);
}

function renderList(filter = '') {
  const c = document.getElementById('list');
  c.innerHTML = '';
  const q = filter.toLowerCase();
  const sorted = [...stores].filter(s => !q || (s.name + s.address + s.zip).toLowerCase().includes(q))
    .sort((a,b) => b.medianIncome - a.medianIncome);

  document.getElementById('count').textContent = sorted.length + ' stores';

  sorted.forEach(s => {
    const d = document.createElement('div');
    d.className = 'store-card p-3 bg-[#0f111c] border border-white/10 rounded-2xl cursor-pointer flex justify-between items-start';
    d.innerHTML = `
      <div>
        <div class="font-semibold">${s.name} ${s.address ? '— ' + s.address.split(',')[0] : ''}</div>
        <div class="text-xs text-slate-400">${s.zip}</div>
      </div>
      <div class="text-right text-amber-400 font-semibold text-sm">$${Math.round(s.medianIncome/1000)}k</div>
    `;
    d.onclick = () => {
      map.flyTo([s.lat, s.lng], 15);
      const m = markers[s.id];
      if (m) setTimeout(() => m.openPopup(), 600);
    };
    c.appendChild(d);
  });
}

function showDetail(s) {
  const html = ` <strong>${s.name}</strong><br>${s.address}<br>ZIP: ${s.zip}<br>Income: $${s.medianIncome.toLocaleString()}<br><br><a href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank">Google Maps (Live Popular Times)</a> `;
  const div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 8000);
}

function manualRefresh() {
  refreshMarkers();
  renderList(document.getElementById('search').value);
}

function init() {
  initMap();
  stores.forEach(createMarker);
  renderList();
  const search = document.getElementById('search');
  if (search) search.oninput = () => renderList(search.value);
  console.log('Loaded ' + stores.length + ' stores from Overpass data');
}
window.onload = init;
