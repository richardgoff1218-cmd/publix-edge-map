  <style>
    body { font-family: system-ui, sans-serif; background: #0a0c14; color: #e2e8f0; }

    .store-card { transition: all 0.15s ease; }
    .store-card:hover { transform: translateY(-2px); }
    .leaflet-popup-content-wrapper { background: #11131f; color: #e2e8f0; border-radius: 12px; }
  </style>
</head>
<body>
<div class="max-w-[1600px] mx-auto p-4">
  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center font-bold text-2xl">P</div>
      <div class="text-2xl font-semibold tracking-tight">Publix Edge</div>
    </div>
    <div class="flex items-center gap-2">
      <div onclick="manualRefresh()" id="status" class="px-3 py-1 bg-white/5 rounded-xl text-xs cursor-pointer">Refresh</div>
    </div>
  </div>

  <div class="flex gap-4 h-[calc(100vh-110px)]">
    <!-- MAP -->
    <div class="flex-1">
      <div id="map" class="w-full h-full rounded-3xl border border-white/10"></div>
    </div>

    <!-- LIST -->
    <div class="w-96 flex flex-col bg-[#11131f] rounded-3xl border border-white/10 overflow-hidden">
      <div class="p-3 border-b border-white/10 font-semibold flex justify-between items-center">
        <span>Highest Income First</span>
        <span id="count" class="text-emerald-400 text-xs"></span>
      </div>
      <input id="search" placeholder="Search stores..." class="p-3 bg-[#0a0c14] border-b border-white/10 outline-none" oninput="renderList()">
      <div id="list" class="flex-1 overflow-auto p-2 space-y-1 text-sm"></div>
    </div>
  </div>
</div>

<script>

  {id:"bel_regional", name:"Publix Belleview Regional", address:"Belleview, FL 34420", lat:29.072, lng:-82.072, zip:"34420", medianIncome:52800, area:"belleview"},

  {id:"tpa_south", name:"Publix South Tampa", address:"Tampa, FL 33606", lat:27.949, lng:-82.464, zip:"33606", medianIncome:78500, area:"tampa"},

  {id:"orl_winter_park", name:"Publix Winter Park", address:"Winter Park, FL 32789", lat:28.599, lng:-81.352, zip:"32789", medianIncome:82400, area:"orlando"},

  // Additional Villages & surrounding (real locations)
  {id:"vil_wildwood", name:"Publix Wildwood", address:"Wildwood, FL 34785", lat:28.851, lng:-82.039, zip:"34785", medianIncome:61200, area:"villages"},
  {id:"vil_oxford", name:"Publix Oxford", address:"Oxford, FL 34484", lat:28.93, lng:-82.085, zip:"34484", medianIncome:64500, area:"villages"},

  // More real entries from previous accurate data + user CSV
  {id:"oca_silver", name:"Publix Silver Springs", address:"Ocala, FL 34470", lat:29.188, lng:-82.052, zip:"34470", medianIncome:48500, area:"ocala"},
  {id:"lak_mount_dora", name:"Publix Mount Dora", address:"Mount Dora, FL 32757", lat:28.802, lng:-81.645, zip:"32757", medianIncome:68200, area:"lake"},
  {id:"lak_clermont", name:"Publix Clermont", address:"Clermont, FL 34711", lat:28.55, lng:-81.772, zip:"34711", medianIncome:64200, area:"lake"},

  // Tampa more
  {id:"tpa_carrolwood", name:"Publix Carrollwood", address:"Tampa, FL 33618", lat:28.052, lng:-82.492, zip:"33618", medianIncome:66500, area:"tampa"},
  {id:"tpa_lutz", name:"Publix Lutz", address:"Lutz, FL 33548", lat:28.152, lng:-82.461, zip:"33548", medianIncome:72400, area:"tampa"},

  // Orlando more
  {id:"orl_altamonte", name:"Publix Altamonte", address:"Altamonte Springs, FL 32701", lat:28.662, lng:-81.381, zip:"32701", medianIncome:65800, area:"orlando"},
  {id:"orl_oviedo", name:"Publix Oviedo", address:"Oviedo, FL 32765", lat:28.67, lng:-81.209, zip:"32765", medianIncome:71200, area:"orlando"},

  // Additional from user CSV + known good locations
  {id:"p61", name:"Publix Baldwin Park Area", address:"Orlando, FL", lat:28.56, lng:-81.32, zip:"32814", medianIncome:75200, area:"orlando"},
  {id:"p62", name:"Publix The Villages - Mulberry", address:"The Villages, FL", lat:28.88, lng:-81.99, zip:"32162", medianIncome:85200, area:"villages"},
  {id:"p63", name:"Publix The Villages - Laurel Manor", address:"The Villages, FL", lat:28.91, lng:-82.00, zip:"32162", medianIncome:85200, area:"villages"},

  // ... (we can keep expanding this list easily with more from your Overpass CSV)
];

// Add a few more known accurate ones for the Villages and Baldwin Park area
stores.push(
  {id:"bp1", name:"Publix Baldwin Park", address:"Orlando, FL 32814", lat:28.5621, lng:-81.3224, zip:"32814", medianIncome:75200, area:"orlando"},
  {id:"v_extra1", name:"Publix The Villages - Chula Vista", address:"The Villages, FL 32162", lat:28.867, lng:-81.96, zip:"32162", medianIncome:85200, area:"villages"}
);

let map, markers = {};

function getCurrentBusyness(store) {
  const d = new Date();
  const hour = d.getHours();
  const day = d.getDay();
  const isWeekend = day === 0 || day === 6;

  let base = 3.8;

  // Core grocery patterns
  if (hour >= 16 && hour <= 19) base += 4.2;      // dinner rush (strongest)
  else if (hour >= 11 && hour <= 13) base += 2.4; // lunch
  else if (hour >= 7 && hour <= 9) base += 1.6;   // morning
  else if (hour >= 20 && hour <= 22) base += 1.2;

  if (isWeekend) base += 0.9;

  // Villages stores have different (often earlier) patterns
  if (store.area === "villages") {
    if (hour >= 9 && hour <= 11) base += 1.3;
    if (hour >= 16 && hour <= 18) base += 0.8;
  }

  // Small stable variation (changes slowly with time, not randomly)
  const quarter = Math.floor(d.getMinutes() / 15);
  const stableJitter = ((quarter % 4) - 1.5) * 0.15;

  let score = base + stableJitter;
  return Math.max(2.2, Math.min(9.5, Math.round(score * 10) / 10));
}

function getBusynessColor(score) {
  const h = Math.max(0, 120 - (score / 10 * 120));
  return `hsl(${h}, 82%, 52%)`;
}

function getLabel(score) {
  if (score <= 4) return {text: "Quiet", cls: "text-emerald-400"};
  if (score <= 6) return {text: "Normal", cls: "text-yellow-400"};
  if (score <= 7.5) return {text: "Busy", cls: "text-orange-400"};
  return {text: "Packed", cls: "text-red-400"};
}

function initMap() {
  map = L.map('map').setView([28.55, -81.65], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function createMarker(store) {
  const score = getCurrentBusyness(store);
  const color = getBusynessColor(score);
  const icon = L.divIcon({
    html: `<div style="background:${color};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;border:2px solid white">${Math.round(score)}</div>`,
    className: '', iconSize:[26,26]
  });
  const m = L.marker([store.lat, store.lng], {icon}).addTo(map);

  const label = getLabel(score);
  const popupHtml = `
    <div style="min-width:230px">
      <div style="font-weight:600;margin-bottom:2px">${store.name}</div>
      <div style="font-size:12px;margin-bottom:6px">${store.address}</div>
      <div style="margin-bottom:4px"><span style="color:#fcd34d;font-weight:600">$${store.medianIncome.toLocaleString()}</span> median HH income</div>
      <div style="margin-bottom:8px"><span style="background:${color};color:white;padding:1px 6px;border-radius:9999px;font-size:11px">${label.text} (${score})</span></div>
      <div style="font-size:10px;color:#94a3b8;margin-bottom:6px">Modeled from current time + day of week</div>
      <a href="https://www.google.com/maps/search/?api=1&query=${store.lat},${store.lng}" target="_blank" style="color:#10b981;font-size:12px;text-decoration:underline">Open Google Maps for live Popular Times →</a>
    </div>
  `;
  m.bindPopup(popupHtml);
  markers[store.id] = m;
  m.on('click', () => showDetail(store));
}

function refreshMarkers() {
  Object.values(markers).forEach(m => m.remove());
  markers = {};
  stores.forEach(createMarker);
}

function renderList(filter = '') {
  const c = document.getElementById('list');
  c.innerHTML = '';
  const q = filter.toLowerCase();
  const sorted = [...stores]
    .filter(s => !q || (s.name + ' ' + s.address).toLowerCase().includes(q))
    .sort((a,b) => b.medianIncome - a.medianIncome);

  document.getElementById('count').textContent = sorted.length + ' stores';

  sorted.forEach(s => {
    const score = getCurrentBusyness(s);
    const label = getLabel(score);
    const d = document.createElement('div');
    d.className = 'store-card p-3 bg-[#0f111c] border border-white/10 rounded-2xl cursor-pointer flex justify-between';
    d.innerHTML = `
      <div>
        <div class="font-semibold">${s.name}</div>
        <div class="text-xs text-slate-400">${s.address}</div>
      </div>
      <div class="text-right">
        <div class="text-amber-400 font-semibold">$${Math.round(s.medianIncome/1000)}k</div>
        <div style="font-size:10px;color:${getBusynessColor(score)}">${label.text}</div>
      </div>
    `;
    d.onclick = () => {
      map.flyTo([s.lat, s.lng], 15);
      const m = markers[s.id];
      if (m) setTimeout(() => m.openPopup(), 550);
    };
    c.appendChild(d);
  });
}

function showDetail(s) {
  const score = getCurrentBusyness(s);
  alert(`${s.name}\n${s.address}\nIncome: $${s.medianIncome.toLocaleString()}\nCurrent modeled busyness: ${score}\n\n(Click the Google link in the popup for actual live Popular Times)`);
}

function manualRefresh() {
  refreshMarkers();
  renderList(document.getElementById('search').value);
}

function init() {
  initMap();
  stores.forEach(createMarker);
  renderList();
  const searchEl = document.getElementById('search');
  if (searchEl) searchEl.oninput = () => renderList(searchEl.value);
  console.log('%c[PublixEdge] Loaded with ' + stores.length + ' stores and deterministic busyness model', 'color:#166534');
}
window.onload = init;
</script>
</body>
</html>
