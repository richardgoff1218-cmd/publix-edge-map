// ============== LIVE MODEL (time + real weather fetch) ==============
async function fetchWeatherMod() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=29.06&longitude=-82.06&current=precipitation,weather_code,temperature_2m&temperature_unit=fahrenheit';
    const res = await fetch(url, { cache: 'no-store' });
    const data = await res.json();
    const cur = data.current;
    let mod = 0;
    const precip = cur.precipitation || 0;
    const temp = cur.temperature_2m || 75;
    const wcode = cur.weather_code || 0;

    if (precip > 0.5) mod += 1.8;                    // steady rain → busier
    if (precip > 2) mod += 0.9;                      // heavy rain
    if (wcode >= 61 && wcode <= 67) mod += 0.7;      // rain codes
    if (wcode >= 80 && wcode <= 82) mod += 1.2;      // rain showers
    if (temp >= 93) mod += 0.8;                      // extreme heat
    if (temp <= 38) mod += 0.6;                      // cold

    weatherMod = Math.min(3.2, Math.max(-0.8, mod));
    lastWeatherUpdate = new Date();
    return weatherMod;
  } catch (e) {
    weatherMod = 0;
    return 0;
  }
}

function getCurrentBusyness(store, refDate = new Date()) {
  const hour = refDate.getHours() + (refDate.getMinutes() / 60);
  const isWeekend = refDate.getDay() === 0 || refDate.getDay() === 6;
  const prof = isWeekend ? store.profileWeekend : store.profileWeekday;

  // interpolate between the two surrounding hours
  const h1 = Math.floor(hour) % 24;
  const h2 = (h1 + 1) % 24;
  const frac = hour - Math.floor(hour);
  let base = prof[h1] * (1 - frac) + prof[h2] * frac;

  // weather modulation (live fetched)
  base = base + weatherMod;

  // tiny time-based jitter so it feels alive between refreshes
  const jitter = Math.sin((Date.now() / 1000 / 60) * 0.8 + store.id.length) * 0.25;
  base += jitter;

  return Math.max(1.3, Math.min(10, Math.round(base * 10) / 10));
}

function getBusynessColor(score) {
  const h = Math.max(0, 120 - (score / 10 * 120));
  return `hsl(${h}, 82%, 52%)`;
}

function getLabel(score) {
  if (score <= 3.8) return {text: 'Quiet', cls: 'text-emerald-400'};
  if (score <= 5.8) return {text: 'Normal', cls: 'text-yellow-400'};
  if (score <= 7.6) return {text: 'Busy', cls: 'text-orange-400'};
  return {text: 'Packed', cls: 'text-red-400'};
}

function getOpportunity(store, score) {
  return (store.medianIncome / 1200) - (score * 6.4);
}

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.circle([29.061, -82.055], { radius: 700, color: '#64748b', fillOpacity: 0.08, weight: 1 }).addTo(map);
}

function createOrUpdateMarker(store) {
  const score = getCurrentBusyness(store);
  const color = getBusynessColor(score);
  const iconHtml = `<div style="background:${color};" class="w-9 h-9 rounded-2xl flex items-center justify-center text-white text-[15px] font-bold shadow-xl ring-2 ring-white/60">${Math.round(score)}</div>`;
  const icon = L.divIcon({ className: 'store-marker', html: iconHtml, iconSize: [36,36], iconAnchor: [18,18] });

  if (markers[store.id]) {
    markers[store.id].setIcon(icon);
    markers[store.id].off('click');
  } else {
    markers[store.id] = L.marker([store.lat, store.lng], {icon}).addTo(map);
  }
  markers[store.id].on('click', () => openSheet(store.id));

  // light trade radius hint
  if (markers[store.id]._circle) map.removeLayer(markers[store.id]._circle);
  const c = L.circle([store.lat, store.lng], { radius: 4200, color: '#64748b', weight: 1, fillOpacity: 0.06, fillColor: '#64748b' }).addTo(map);
  markers[store.id]._circle = c;
}

function refreshMarkers() {
  stores.forEach(s => createOrUpdateMarker(s));
}

function toggleTradeAreas() {
  showingTradeAreas = !showingTradeAreas;
  if (activeTradeLayer) { map.removeLayer(activeTradeLayer); activeTradeLayer = null; }
  if (showingTradeAreas) {
    const polys = stores.filter(s => s.tradePoly).map(s => 
      L.polygon(s.tradePoly, { color: '#a3e635', weight: 2.5, fillOpacity: 0.12, fillColor: '#a3e635' })
    );
    if (polys.length) activeTradeLayer = L.layerGroup(polys).addTo(map);
  }
}

function highlightTradeArea() {
  const store = window.currentSheetStore;
  if (!store) return;
  if (activeTradeLayer) map.removeLayer(activeTradeLayer);
  if (store.tradePoly) {
    activeTradeLayer = L.polygon(store.tradePoly, { color: '#eab308', weight: 3.5, fillOpacity: 0.18, fillColor: '#eab308' }).addTo(map);
    map.fitBounds(activeTradeLayer.getBounds(), { padding: [30,30], maxZoom: 13 });
  } else {
    const c = L.circle([store.lat, store.lng], { radius: 5500, color: '#eab308', weight: 2.5, fillOpacity: 0.12 }).addTo(map);
    activeTradeLayer = c;
    setTimeout(() => { if (activeTradeLayer === c) map.removeLayer(c); activeTradeLayer = null; }, 6200);
  }
}

// ============== SHEET (no logging) ==============
window.currentSheetStore = null;

function openSheet(storeId) {
  const store = stores.find(s => s.id === storeId);
  if (!store) return;
  window.currentSheetStore = store;

  const score = getCurrentBusyness(store);
  const lab = getLabel(score);
  const ref = simDate || new Date();
  const explain = `Modeled from ${ref.getHours()}:00 pattern${weatherMod !== 0 ? ' + live weather' : ''}`;

  document.getElementById('sheet-name').textContent = store.name;
  document.getElementById('sheet-score').textContent = score.toFixed(1);
  document.getElementById('sheet-score').style.color = getBusynessColor(score);
  document.getElementById('sheet-label').innerHTML = `<span class="${lab.cls}">${lab.text}</span>`;
  document.getElementById('sheet-explain').textContent = explain;

  document.getElementById('sheet-income').innerHTML = '$' + store.medianIncome.toLocaleString() + ' <span class="text-xs font-normal text-slate-400">median HH</span>';
  document.getElementById('sheet-zip').textContent = 'ZIP ' + store.zip;
  document.getElementById('sheet-trade').innerHTML = store.tradeNote || 'Typical 4–7 mile primary trade area.';

  const dist = userPos ? (getDistanceTo(store) * 0.000621371).toFixed(1) : '--';
  document.getElementById('sheet-meta').innerHTML = `<div>${store.address}</div><div class="font-mono text-emerald-300">${dist} mi</div>`;

  const sheet = document.getElementById('detail-sheet');
  sheet.classList.remove('hidden');
  sheet.style.transform = 'translateY(0)';
}

function closeSheet() {
  const sheet = document.getElementById('detail-sheet');
  sheet.style.transform = 'translateY(120%)';
  setTimeout(() => sheet.classList.add('hidden'), 260);
  if (activeTradeLayer) { map.removeLayer(activeTradeLayer); activeTradeLayer = null; }
}

function openGoogleForCurrent() {
  const store = window.currentSheetStore;
  if (!store) return;
  const q = encodeURIComponent(store.name + ', ' + store.address);
  window.open(`https://www.google.com/maps/search/?api=1&query=${q}`, '_blank');
}

// ============== OPPORTUNITIES ==============
function renderOpportunities() {
  const container = document.getElementById('opp-list');
  container.innerHTML = '';
  const scored = stores.map(s => ({ s, score: getCurrentBusyness(s), opp: getOpportunity(s, getCurrentBusyness(s)) }));
  scored.sort((a, b) => b.opp - a.opp);

  scored.slice(0, 6).forEach(item => {
    const { s, score } = item;
    const lab = getLabel(score);
    const div = document.createElement('div');
    div.className = `flex gap-3 items-center glass border border-slate-800 rounded-2xl p-3 active:scale-[0.985] cursor-pointer`;
    const dist = userPos ? (getDistanceTo(s) * 0.000621371).toFixed(0) : '--';
    div.innerHTML = `
      <div style="background:${getBusynessColor(score)};" class="w-10 h-10 flex-shrink-0 rounded-2xl text-white flex items-center justify-center font-bold text-lg shadow">${Math.round(score)}</div>
      <div class="flex-1 min-w-0">
        <div class="font-semibold truncate">${s.name}</div>
        <div class="text-xs text-emerald-300">$${Math.round(s.medianIncome/1000)}k • ${lab.text}</div>
      </div>
      <div class="text-right text-xs font-mono text-slate-400">${dist}mi</div>
    `;
    div.onclick = () => openSheet(s.id);
    container.appendChild(div);
  });
}

// ============== GPS ==============
function getDistanceTo(store) {
  if (!userPos) return 99999;
  const R = 6371e3;
  const dLat = (store.lat - userPos.lat) * Math.PI / 180;
  const dLon = (store.lng - userPos.lng) * Math.PI / 180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(userPos.lat*Math.PI/180)*Math.cos(store.lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function useMyLocation() {
  if (!navigator.geolocation) { alert('GPS not available'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    map.setView([userPos.lat, userPos.lng], 11);
    if (window.userMarker) map.removeLayer(window.userMarker);
    window.userMarker = L.circleMarker([userPos.lat, userPos.lng], { radius: 7, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.9, weight: 2 }).addTo(map);
    renderOpportunities();
  }, () => alert('Could not get your location. Check GPS permission.'));
}

// ============== TIME SIM + LIVE LOOP ==============
function showTimeSimulator() {
  const now = simDate || new Date();
  const html = `<div class="fixed inset-0 bg-black/70 z-[70] flex items-end" onclick="this.remove()"><div class="glass border-t border-slate-700 w-full rounded-t-3xl p-5" onclick="event.stopImmediatePropagation()"><div class="font-semibold mb-3">Simulate time of day (for planning)</div><input type="range" min="0" max="23" step="1" value="${now.getHours()}" class="w-full accent-emerald-400" id="sim-slider" oninput="applySimTime(this.value)"><div class="flex justify-between text-xs text-slate-400 mt-1"><div>6am</div><div>12pm</div><div>6pm</div><div>11pm</div></div><div class="mt-4 flex gap-2"><button onclick="applySimPreset(17)" class="flex-1 py-2 bg-slate-800 rounded-2xl text-sm">Tonight 6pm rush</button><button onclick="applySimPreset(11)" class="flex-1 py-2 bg-slate-800 rounded-2xl text-sm">Sunday lunch</button><button onclick="clearSim();document.querySelector('.fixed.inset-0').remove()" class="flex-1 py-2 bg-slate-800 rounded-2xl text-sm">Back to live</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('sim-slider').oninput = function(){ applySimTime(this.value); };
}

function applySimTime(h) {
  simDate = new Date(); simDate.setHours(parseInt(h), 20, 0, 0);
  document.getElementById('sim-time').textContent = simDate.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  refreshAll();
}

function applySimPreset(hour) {
  simDate = new Date(); simDate.setHours(hour, 20, 0, 0);
  document.querySelectorAll('.fixed.inset-0').forEach(el => el.remove());
  document.getElementById('sim-time').textContent = simDate.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  refreshAll();
}

function clearSim() {
  simDate = null;
  document.getElementById('sim-time').textContent = 'Live';
  refreshAll();
}

function getRefDate() { return simDate || new Date(); }

async function refreshAll(forceWeather = false) {
  if (forceWeather || !lastWeatherUpdate || (Date.now() - lastWeatherUpdate.getTime() > 1000 * 60 * 7)) {
    await fetchWeatherMod();
    updateWeatherBar();
  }
  refreshMarkers();
  renderOpportunities();
  updateStatus();
}

// ============== STATUS + WEATHER BAR ==============
function updateStatus() {
  const el = document.getElementById('live-status');
  const ref = getRefDate();
  const timeStr = ref.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  el.innerHTML = `Live • ${timeStr}`;
}

function updateWeatherBar() {
  const el = document.getElementById('weather-bar');
  if (!lastWeatherUpdate) {
    el.innerHTML = `<span>Weather: loading live conditions…</span>`;
    return;
  }
  const modText = weatherMod > 0.3 ? ` <span class="text-orange-400">(+${weatherMod.toFixed(1)} busier from weather)</span>` : (weatherMod < -0.2 ? ` <span class="text-emerald-400">(slightly quieter)</span>` : '');
  el.innerHTML = `<span>Live weather for Belleview area applied to model${modText}</span><span class="text-[10px] ml-auto text-slate-500">${lastWeatherUpdate.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>`;
}

async function manualRefresh() {
  const el = document.getElementById('live-status');
  const old = el.innerHTML;
  el.innerHTML = 'Updating…';
  await refreshAll(true);
  el.innerHTML = old;
}

// ============== AUTO TICK (real time + weather) ==============
let tickInterval = null;

function startLiveLoop() {
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(async () => {
    if (!simDate) {
      // only auto-fetch weather every ~8 minutes
      if (!lastWeatherUpdate || (Date.now() - lastWeatherUpdate.getTime() > 1000 * 60 * 8)) {
        await fetchWeatherMod();
        updateWeatherBar();
      }
      refreshMarkers();
      renderOpportunities();
      updateStatus();
    }
  }, 60000);
}

// ============== INIT ==============
async function initialize() {
  initMap();
  await fetchWeatherMod();
  updateWeatherBar();

  stores.forEach(s => createOrUpdateMarker(s));
  renderOpportunities();
  updateStatus();
  startLiveLoop();

  // friendly first hint
  setTimeout(() => {
    const hint = document.createElement('div');
    hint.className = 'fixed bottom-[100px] left-4 right-4 max-w-[1000px] mx-auto glass border border-emerald-900/40 text-xs px-4 py-2 rounded-3xl flex items-center gap-2';
    hint.innerHTML = `<span>Tip: Tap any store marker for details + the real Google live graph button.</span><button class="ml-auto text-emerald-400" onclick="this.parentElement.remove()">OK</button>`;
    document.body.appendChild(hint);
    setTimeout(() => { if (hint.parentElement) hint.remove(); }, 8200);
  }, 4800);

  console.log('%c[PublixEdge] Pure live model (no user data) initialized with ' + stores.length + ' stores + Open-Meteo weather', 'color:#166534');
}

window.onload = initialize;
</script>
