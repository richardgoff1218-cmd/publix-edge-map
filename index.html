// Live model functions (kept from before)
async function fetchWeatherMod() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=29.06&longitude=-82.06&current=precipitation,weather_code,temperature_2m&temperature_unit=fahrenheit', {cache:'no-store'});
    const data = await res.json();
    const cur = data.current || {};
    let mod = 0;
    if ((cur.precipitation || 0) > 0.5) mod += 1.7;
    if ((cur.temperature_2m || 75) >= 93) mod += 0.7;
    weatherMod = Math.min(2.8, Math.max(-0.6, mod));
    lastWeatherUpdate = new Date();
  } catch(e) { weatherMod = 0; }
}

function getCurrentBusyness(store, refDate = new Date()) {
  const hour = refDate.getHours() + (refDate.getMinutes()/60);
  const isWeekend = refDate.getDay() === 0 || refDate.getDay() === 6;
  // Simple but effective profiles
  const prof = isWeekend ? [2,2,2.5,3.5,5,7,8.5,9,8.5,8,8.5,9,9.5,9,8.5,8.8,9.3,9,8,6.5,5,4,3,2.5] : [2.3,2,2,2.6,3.7,5.5,7.2,8.3,7.6,7.1,7.6,8.6,9,8.5,8,8.5,9.3,9.4,8.1,6.6,5.2,4.2,3.2,2.5];
  const h1 = Math.floor(hour) % 24;
  const h2 = (h1 + 1) % 24;
  let base = prof[h1]*(1-(hour%1)) + prof[h2]*(hour%1);
  base += weatherMod;
  return Math.max(1.4, Math.min(10, Math.round(base*10)/10));
}

function getBusynessColor(score) { const h = Math.max(0,120-(score/10*120)); return `hsl(${h},82%,52%)`; }

function getLabel(score) { if(score<=3.8) return {text:'Quiet',cls:'text-emerald-400'}; if(score<=5.8) return {text:'Normal',cls:'text-yellow-400'}; if(score<=7.6) return {text:'Busy',cls:'text-orange-400'}; return {text:'Packed',cls:'text-red-400'}; }

function initMap() {
  map = L.map('map', {zoomControl:false, attributionControl:false}).setView([28.55, -81.65], 9);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function createOrUpdateMarker(store) {
  const score = getCurrentBusyness(store);
  const color = getBusynessColor(score);
  const iconHtml = `<div style="background:${color}" class="w-9 h-9 rounded-2xl flex items-center justify-center text-white text-[15px] font-bold shadow-xl ring-2 ring-white/60">${Math.round(score)}</div>`;
  const icon = L.divIcon({className:'store-marker', html:iconHtml, iconSize:[36,36], iconAnchor:[18,18]});

  if (markers[store.id]) {
    markers[store.id].setIcon(icon);
  } else {
    markers[store.id] = L.marker([store.lat, store.lng], {icon}).addTo(map);
  }

  const popupHtml = `
    <div style="min-width:230px">
      <strong style="font-size:14px">${store.name}</strong><br>
      <span style="color:#fcd34d"><strong>$${store.medianIncome.toLocaleString()}</strong> median HH</span><br>
      <span style="font-size:12px">${getLabel(score).text} (${score.toFixed(1)}) — live model</span><br>
      <div style="margin:8px 0 6px 0;font-size:11px;color:#94a3b8">${store.tradeNote || ''}</div>
      <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(store.name+' '+store.address)}','_blank')" style="background:#10b981;color:#0a0c14;font-weight:600;padding:5px 10px;border-radius:9999px;font-size:12px;width:100%">Google Maps — Live Popular Times</button>
    </div>`;

  markers[store.id].bindPopup(popupHtml, {maxWidth:270, offset:[0,-6]});
}

function refreshMarkers() { stores.forEach(s => createOrUpdateMarker(s)); }

// ============== RIGHT LIST (ALWAYS SHOWS ALL) ==============
function renderStoreList(filterText = '') {
  const container = document.getElementById('store-list');
  container.innerHTML = '';
  const q = filterText.toLowerCase();

  const sorted = [...stores]
    .filter(s => !q || s.name.toLowerCase().includes(q) || (s.zip||'').includes(q))
    .sort((a,b) => b.medianIncome - a.medianIncome);

  document.getElementById('list-count').innerHTML = `${sorted.length} stores shown • Highest income first`;

  sorted.forEach(store => {
    const score = getCurrentBusyness(store);
    const div = document.createElement('div');
    div.className = 'store-card flex gap-3 items-center bg-[#11131f] border border-white/10 hover:border-emerald-400/30 rounded-2xl p-3 cursor-pointer active:scale-[0.985]';
    div.innerHTML = `
      <div style="background:${getBusynessColor(score)}" class="w-9 h-9 flex-shrink-0 rounded-2xl text-white flex items-center justify-center font-bold text-base shadow">${Math.round(score)}</div>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-sm truncate">${store.name}</div>
        <div class="text-[10px] text-slate-400">${store.zip} • ${getLabel(score).text}</div>
      </div>
      <div class="text-right">
        <div class="font-semibold text-amber-400 tabular-nums text-lg leading-none">$${Math.round(store.medianIncome/1000)}k</div>
        <div class="text-[9px] text-slate-500 -mt-px">income</div>
      </div>`;
    div.onclick = () => selectStoreFromList(store);
    container.appendChild(div);
  });
}

function filterList() {
  renderStoreList(document.getElementById('list-search').value);
}

function selectStoreFromList(store) {
  const m = markers[store.id];
  if (!m) return;
  map.flyTo([store.lat, store.lng], 15, {duration: 0.55});
  setTimeout(() => m.openPopup(), 620);
}
