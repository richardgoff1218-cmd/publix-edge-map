let map, markers = {};

function initMap() {
  map = L.map('map').setView([28.55, -81.65], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function createMarker(store) {
  const score = 5 + Math.random() * 3; // placeholder for demo
  const color = score > 7 ? '#ef4444' : (score > 5 ? '#eab308' : '#22c55e');
  const icon = L.divIcon({html: `<div style="background:${color};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:white;border:2px solid white">${Math.round(score)}</div>`, className:'', iconSize:[28,28]});
  const m = L.marker([store.lat, store.lng], {icon}).addTo(map);
  m.bindPopup(`<b>${store.name}</b><br>$${store.medianIncome.toLocaleString()} median income<br><a href="https://www.google.com/maps/search/?api=1&query=${store.lat},${store.lng}" target="_blank">Open in Google Maps</a>`);
  markers[store.id] = m;
  m.on('click', () => openDetail(store));
}

function refreshMarkers() {
  Object.values(markers).forEach(m => m.remove());
  markers = {};
  stores.forEach(createMarker);
}

function renderList(filter = '') {
  const container = document.getElementById('list');
  container.innerHTML = '';
  const q = filter.toLowerCase();
  const sorted = [...stores].filter(s => !q || s.name.toLowerCase().includes(q) || s.zip.includes(q)).sort((a,b) => b.medianIncome - a.medianIncome);
  document.getElementById('count').textContent = `${sorted.length} stores`;

  sorted.forEach(s => {
    const div = document.createElement('div');
    div.className = 'store-card p-3 bg-[#0f111c] border border-white/10 rounded-2xl cursor-pointer flex justify-between';
    div.innerHTML = `<div><div class="font-semibold">${s.name}</div><div class="text-xs text-slate-400">${s.zip}</div></div><div class="text-right text-amber-400 font-semibold">$${Math.round(s.medianIncome/1000)}k</div>`;
    div.onclick = () => {
      map.flyTo([s.lat, s.lng], 15);
      const m = markers[s.id];
      if (m) m.openPopup();
    };
    container.appendChild(div);
  });
}

function openDetail(s) {
  alert(`${s.name}\nIncome: $${s.medianIncome.toLocaleString()}\nLocation: ${s.lat}, ${s.lng}`);
}

function manualRefresh() {
  refreshMarkers();
  renderList(document.getElementById('search').value);
}

function init() {
  initMap();
  stores.forEach(createMarker);
  renderList();
  document.getElementById('search').oninput = () => renderList(document.getElementById('search').value);
  console.log('Loaded ' + stores.length + ' accurate stores');
}
window.onload = init;
